<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Televix</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; }
        iframe { width: 100vw; height: 100vh; border: 0; }
    </style>
</head>
<body>
    <iframe id="app" src="https://22b142e7-41d2-49d7-bfb9-3568e823685f.preview.emergentagent.com/" allow="autoplay; fullscreen"></iframe>
    <script>
        // Forward Tizen / webOS remote keys to the iframe
        document.addEventListener('keydown', function (e) {
            try {
                var f = document.getElementById('app');
                if (f && f.contentWindow) {
                    f.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: e.key }));
                }
            } catch (_) {}
        });
    </script>
</body>
</html>
