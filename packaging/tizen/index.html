<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Televix</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; color: #fff; font-family: sans-serif; }
        #app { position: fixed; inset: 0; border: 0; width: 100vw; height: 100vh; }
        #player { position: fixed; inset: 0; display: none; background: #000; z-index: 10; }
        #player-bg { width: 100%; height: 100%; background: #000; }
        #player-info { position: absolute; top: 24px; left: 24px; right: 24px; padding: 14px 22px; background: rgba(0,0,0,.6); border-radius: 14px; font-size: 22px; }
        #tracks-overlay {
            position: absolute; right: 32px; bottom: 90px;
            background: rgba(10,10,10,.95); border: 1px solid #222;
            border-radius: 18px; padding: 14px; min-width: 320px; max-height: 60vh; overflow-y: auto;
            display: none;
        }
        #tracks-overlay h3 { color:#FFB800; margin: 6px 12px; font-size:14px; letter-spacing:.3em; text-transform:uppercase; }
        .track-btn { display:block; width:100%; text-align:left; background:transparent; color:#ddd; border:0; padding:14px 18px; font-size:18px; border-radius:12px; cursor:pointer; }
        .track-btn:hover, .track-btn:focus { background:#FFB800; color:#000; outline:none; }
        .track-btn.active { background:#FFB800; color:#000; font-weight:bold; }
        #player-help { position:absolute; left:24px; bottom:24px; padding:10px 18px; background:rgba(0,0,0,.6); border-radius:12px; font-size:14px; color:#aaa; }
    </style>
</head>
<body>
    <iframe id="app" src="https://22b142e7-41d2-49d7-bfb9-3568e823685f.preview.emergentagent.com/" allow="autoplay; fullscreen"></iframe>

    <!-- Native AVPlay layer (used for MKV multi-audio/subtitle playback) -->
    <div id="player">
        <object id="avplay" type="application/avplayer" style="width:100%;height:100%"></object>
        <div id="player-info">Reproduciendo…</div>
        <div id="tracks-overlay">
            <h3 id="tracks-title">Audio</h3>
            <div id="tracks-list"></div>
        </div>
        <div id="player-help">Botones: ENTER pausa · ◀▶ ±10s · 1 audio · 2 subs · BACK salir</div>
    </div>

    <script>
    (function () {
        var avplay = (typeof webapis !== 'undefined' && webapis.avplay) ? webapis.avplay : null;
        var playerEl = document.getElementById('player');
        var info = document.getElementById('player-info');
        var overlay = document.getElementById('tracks-overlay');
        var overlayTitle = document.getElementById('tracks-title');
        var overlayList = document.getElementById('tracks-list');
        var currentTracks = { audio: [], text: [] };
        var overlayMode = null; // 'audio' | 'text'

        function ready() { return avplay !== null; }

        function getTracks() {
            try {
                var info = avplay.getTotalTrackInfo();
                currentTracks.audio = info.filter(function (t) { return t.type === 'AUDIO'; });
                currentTracks.text  = info.filter(function (t) { return t.type === 'TEXT'; });
            } catch (e) { console.error('getTotalTrackInfo failed', e); }
        }

        function showTracks(kind) {
            overlayMode = kind;
            overlayTitle.textContent = kind === 'audio' ? 'Pista de audio' : 'Subtítulos';
            overlayList.innerHTML = '';
            getTracks();
            var list = kind === 'audio' ? currentTracks.audio : currentTracks.text;
            if (kind === 'text') {
                var off = document.createElement('button');
                off.className = 'track-btn';
                off.textContent = 'Desactivado';
                off.onclick = function () { try { avplay.setSilentSubtitle(true); } catch (e) {} hideOverlay(); };
                overlayList.appendChild(off);
            }
            list.forEach(function (t) {
                var btn = document.createElement('button');
                btn.className = 'track-btn';
                var info = '';
                try { info = JSON.parse(t.extra_info || '{}').track_lang || ''; } catch (e) {}
                btn.textContent = info || ('Pista ' + (t.index + 1));
                btn.onclick = function () {
                    try {
                        avplay.setSelectTrack(t.type, t.index);
                        if (kind === 'text') avplay.setSilentSubtitle(false);
                    } catch (e) { console.error(e); }
                    hideOverlay();
                };
                overlayList.appendChild(btn);
            });
            overlay.style.display = 'block';
            var first = overlayList.querySelector('.track-btn');
            if (first) first.focus();
        }

        function hideOverlay() {
            overlay.style.display = 'none';
            overlayMode = null;
        }

        // Expose API to the iframe so the React app can request native MKV playback
        window.addEventListener('message', function (ev) {
            if (!ev.data || typeof ev.data !== 'object') return;
            if (ev.data.action === 'play' && ready()) {
                playerEl.style.display = 'block';
                info.textContent = ev.data.title || 'Reproduciendo…';
                try {
                    avplay.close();
                    avplay.open(ev.data.url);
                    avplay.setDisplayRect(0, 0, window.innerWidth, window.innerHeight);
                    avplay.prepare();
                    avplay.play();
                } catch (e) { console.error('AVPlay error', e); }
            } else if (ev.data.action === 'stop') {
                try { avplay.stop(); avplay.close(); } catch (e) {}
                playerEl.style.display = 'none';
            }
        });

        // Remote control keys for the native player
        document.addEventListener('keydown', function (e) {
            if (playerEl.style.display !== 'block') {
                // forward to iframe
                try {
                    var f = document.getElementById('app');
                    if (f && f.contentWindow) {
                        f.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: e.key }));
                    }
                } catch (_) {}
                return;
            }
            // overlay open?
            if (overlay.style.display === 'block') {
                if (e.key === 'Escape' || e.keyCode === 10009) hideOverlay();
                return;
            }
            switch (e.key) {
                case 'Enter': case ' ':
                    try { avplay.getState() === 'PLAYING' ? avplay.pause() : avplay.play(); } catch (_) {}
                    break;
                case 'ArrowLeft':
                    try { avplay.jumpBackward(10000); } catch (_) {}
                    break;
                case 'ArrowRight':
                    try { avplay.jumpForward(10000); } catch (_) {}
                    break;
                case '1':
                    showTracks('audio'); break;
                case '2':
                    showTracks('text'); break;
                case 'Escape':
                    try { avplay.stop(); avplay.close(); } catch (_) {}
                    playerEl.style.display = 'none';
                    break;
            }
        });

        // Register Samsung TV remote keys (number 1, 2)
        try {
            if (typeof tizen !== 'undefined' && tizen.tvinputdevice) {
                ['1', '2', 'MediaPlayPause', 'MediaRewind', 'MediaFastForward', 'MediaStop', 'ColorF0Red', 'ColorF1Green', 'ColorF2Yellow', 'ColorF3Blue'].forEach(function (k) {
                    try { tizen.tvinputdevice.registerKey(k); } catch (_) {}
                });
            }
        } catch (_) {}
    })();
    </script>
</body>
</html>
