<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <title>Televix</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; color: #fff; font-family: sans-serif; }
        #app { position: fixed; inset: 0; border: 0; width: 100vw; height: 100vh; }
        #player { position: fixed; inset: 0; display: none; background: #000; z-index: 10; }
        #video { width: 100%; height: 100%; background: #000; }
        #player-info { position: absolute; top: 24px; left: 24px; right: 24px; padding: 14px 22px; background: rgba(0,0,0,.6); border-radius: 14px; font-size: 22px; }
        #tracks-overlay {
            position: absolute; right: 32px; bottom: 90px;
            background: rgba(10,10,10,.95); border: 1px solid #222;
            border-radius: 18px; padding: 14px; min-width: 320px; max-height: 60vh; overflow-y: auto;
            display: none;
        }
        #tracks-overlay h3 { color:#FFB800; margin: 6px 12px; font-size:14px; letter-spacing:.3em; text-transform:uppercase; }
        .track-btn { display:block; width:100%; text-align:left; background:transparent; color:#ddd; border:0; padding:14px 18px; font-size:18px; border-radius:12px; cursor:pointer; }
        .track-btn:hover, .track-btn:focus { background:#FFB800; color:#000; outline:none; }
        #player-help { position:absolute; left:24px; bottom:24px; padding:10px 18px; background:rgba(0,0,0,.6); border-radius:12px; font-size:14px; color:#aaa; }
    </style>
</head>
<body>
    <iframe id="app" src="https://22b142e7-41d2-49d7-bfb9-3568e823685f.preview.emergentagent.com/" allow="autoplay; fullscreen"></iframe>

    <!-- Native LG webOS AVPlayer layer for MKV multi-audio/subtitle playback -->
    <div id="player">
        <video id="video"></video>
        <div id="player-info">Reproduciendo…</div>
        <div id="tracks-overlay">
            <h3 id="tracks-title">Audio</h3>
            <div id="tracks-list"></div>
        </div>
        <div id="player-help">ENTER pausa · ◀▶ ±10s · 1 audio · 2 subs · BACK salir</div>
    </div>

    <script>
    (function () {
        var video = document.getElementById('video');
        var playerEl = document.getElementById('player');
        var info = document.getElementById('player-info');
        var overlay = document.getElementById('tracks-overlay');
        var overlayTitle = document.getElementById('tracks-title');
        var overlayList = document.getElementById('tracks-list');

        function showTracks(kind) {
            overlayTitle.textContent = kind === 'audio' ? 'Pista de audio' : 'Subtítulos';
            overlayList.innerHTML = '';
            var list = kind === 'audio'
                ? (video.audioTracks ? Array.from(video.audioTracks) : [])
                : (video.textTracks ? Array.from(video.textTracks) : []);
            if (kind === 'text') {
                var off = document.createElement('button');
                off.className = 'track-btn';
                off.textContent = 'Desactivado';
                off.onclick = function () {
                    Array.from(video.textTracks).forEach(function (t) { t.mode = 'disabled'; });
                    hideOverlay();
                };
                overlayList.appendChild(off);
            }
            list.forEach(function (t, i) {
                var btn = document.createElement('button');
                btn.className = 'track-btn';
                btn.textContent = (t.label || t.language || ('Pista ' + (i + 1)));
                btn.onclick = function () {
                    if (kind === 'audio') {
                        Array.from(video.audioTracks).forEach(function (a, j) { a.enabled = j === i; });
                    } else {
                        Array.from(video.textTracks).forEach(function (s, j) { s.mode = j === i ? 'showing' : 'disabled'; });
                    }
                    hideOverlay();
                };
                overlayList.appendChild(btn);
            });
            overlay.style.display = 'block';
            var first = overlayList.querySelector('.track-btn');
            if (first) first.focus();
        }

        function hideOverlay() { overlay.style.display = 'none'; }

        // webOS exposes MKV-friendly extension via mediaOption (multi-audio/subtitle)
        window.addEventListener('message', function (ev) {
            if (!ev.data || typeof ev.data !== 'object') return;
            if (ev.data.action === 'play') {
                playerEl.style.display = 'block';
                info.textContent = ev.data.title || 'Reproduciendo…';
                var src = ev.data.url;
                // webOS: pasar mediaOption como hint para MKV
                try {
                    var option = { mediaTransportType: 'URI', option: { adaptiveStreaming: { apsId: 'HTTP' } } };
                    src = 'mediaOption=' + encodeURIComponent(JSON.stringify(option)) + '&' + src;
                } catch (_) {}
                video.src = src;
                video.play().catch(function () {});
            } else if (ev.data.action === 'stop') {
                video.pause();
                video.removeAttribute('src');
                playerEl.style.display = 'none';
            }
        });

        document.addEventListener('keydown', function (e) {
            if (playerEl.style.display !== 'block') {
                try {
                    var f = document.getElementById('app');
                    if (f && f.contentWindow) {
                        f.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: e.key }));
                    }
                } catch (_) {}
                return;
            }
            if (overlay.style.display === 'block') {
                if (e.key === 'Escape' || e.keyCode === 461) hideOverlay();
                return;
            }
            switch (e.key) {
                case 'Enter': case ' ':
                    video.paused ? video.play() : video.pause();
                    break;
                case 'ArrowLeft':
                    video.currentTime = Math.max(0, video.currentTime - 10); break;
                case 'ArrowRight':
                    video.currentTime = video.currentTime + 10; break;
                case '1':
                    showTracks('audio'); break;
                case '2':
                    showTracks('text'); break;
                case 'Escape':
                    video.pause();
                    video.removeAttribute('src');
                    playerEl.style.display = 'none';
                    break;
            }
        });
    })();
    </script>
</body>
</html>
